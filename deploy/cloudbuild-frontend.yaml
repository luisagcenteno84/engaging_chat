steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'frontend_streamlit/Dockerfile', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/engagingchat-frontend:${_TAG}', 'frontend_streamlit']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/engagingchat-frontend:${_TAG}']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/engagingchat-frontend:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max'
      - '1'
      - '--set-env-vars'
      - 'API_URL=${_API_URL}'
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/engagingchat-frontend:${_TAG}'
# When deploying: set _API_URL to your backend Cloud Run URL, e.g.:
#   gcloud builds submit --config=deploy/cloudbuild-frontend.yaml --substitutions=_API_URL=https://engagingchat-api-XXXXXX.run.app .
# Or get it with: gcloud run services describe engagingchat-api --region=us-west4 --format='value(status.url)'
substitutions:
  _TAG: latest
  _REGION: us-west4
  _REPO: engagingchat
  _FRONTEND_SERVICE: engagingchat-ui
  _API_URL: https://engagingchat-api-120423998665.us-west4.run.app
options:
  logging: CLOUD_LOGGING_ONLY
